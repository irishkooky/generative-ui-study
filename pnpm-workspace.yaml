overrides:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1

trustPolicy: no-downgrade

# postcss/@babel が引く正規の deep transitive 依存。provenance 不足による誤検知のため、
# この特定バージョンのみ trust チェックから除外する（将来の別バージョンは引き続き検証対象）。
trustPolicyExclude:
  - "nanoid@3.3.14"
  - "semver@6.3.1"

onlyBuiltDependencies:
  - esbuild

minimumReleaseAge: 0

allowBuilds:
  msgpackr-extract: false
