name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installs Vite+, sets up Node.js (from .node-version) and the package
      # manager, caches installs, and runs `vp install` (run-install defaults to true).
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
      - run: vp check
      - run: vp test
      - run: vp build
